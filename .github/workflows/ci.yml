name: CI

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "release/**"
      - "hotfix/**"
  pull_request:
    branches:
      - main
      - develop

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e .

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Run demo-good
        run: python -m sg_preflight demo-good --fail-on error

      - name: Run demo-broken
        shell: pwsh
        run: |
          python -m sg_preflight demo-broken --fail-on error
          if ($LASTEXITCODE -ne 2) {
            throw "demo-broken returned exit code $LASTEXITCODE instead of 2"
          }
